services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5028:8080"
    volumes:
      - app_data:/app/App_Data
      - app_uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      libretranslate:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techsupport}
      POSTGRES_USER: ${POSTGRES_USER:-techsupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techsupport} -d ${POSTGRES_DB:-techsupport}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    entrypoint: ["./venv/bin/libretranslate"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--update-models"
      - "--load-only"
      - "en,ru"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 20s
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  libretranslate_data:
  ollama_data:
  app_data:
  app_uploads:
